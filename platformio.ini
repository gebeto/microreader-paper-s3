[platformio]
default_env = m5stack-paper-s3

[env:m5stack-paper-s3]
platform = espressif32
board = esp32-s3-devkitm-1
framework = arduino
board_build.partitions = default_16MB.csv
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
board_build.arduino.memory_type = qio_opi

lib_deps =
    m5stack/M5Unified @ ^0.2.2
    https://github.com/bitbank2/FastEPD.git
    https://github.com/bitbank2/bb_captouch.git
    https://github.com/bitbank2/bb_truetype.git
    bitbank2/JPEGDEC@^1.4.1
    bitbank2/PNGdec@^1.0.1


build_flags =
    -DESP32S3
    -std=c++2a
    -Isrc
    -DCORE_DEBUG_LEVEL=5
    -DUSE_M5UNIFIED=1
    -DM5_PORTRAIT_ROTATION=3
    -DMINIZ_NO_DEFLATE_APIS=1
    -DMINIZ_NO_ARCHIVE_APIS=1
    -DEINK_WIDTH=540
    -DEINK_HEIGHT=960
    -DUSE_UTF8_LONG_NAMES=1
    -DSD_CS=47
    -DSD_SCK=39
    -DSD_MISO=40
    -DSD_MOSI=38
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCONFIG_ESP_TASK_WDT_INIT=0
    -DDEBUG_IO=1
    -Wno-attributes
    -Wno-address-of-packed-member
    -DNO_SIMD=1
    -DPNG_MAX_BUFFERED_PIXELS=8192
    -DBOARD_HAS_PSRAM
    -DARDUINO_LOOP_STACK_SIZE=16384
